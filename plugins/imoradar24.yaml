# Imoradar24.ro vendor manifest (real estate; same Roam platform as imobiliare.ro).
#
# The SERP ld+json holds listings at @graph[*].mainEntity.itemListElement with
# fields under item.*. It exposes NO listing URL — but the numeric id from
# item.@id (…/item-<id>, via `~tail:-`) rebuilds one: /oferta/<any-slug>-<id>
# 301-redirects to the real listing (verified live 2026-06). No seller flag in
# the ld+json: mostly agencies, so isPrivateOwner is left to default (company).

vendor: Imoradar24
domain: imoradar24.ro
engine: json-extractor
rate_limit_ms: 3000

search_mapping:
  payload_locator: "ldjson"
  json_path_to_items: "@graph.*.mainEntity.itemListElement"
  fields:
    id: "item.@id.~tail:-"
    title: "item.name"
    price: "item.offers.priceSpecification.price"
    currency: "item.offers.priceSpecification.priceCurrency"
    url: "https://www.imoradar24.ro/oferta/a-{item.@id.~tail:-}"
    imageUrl: "item.image.url"

# Detail page (calibrated against a live product page 2026-06). Same Roam @graph
# shape as imobiliare: Product node has name/@id, Offer node has the price + the
# real listing url. `~type:<T>` selects the right node from the graph.
product_mapping:
  payload_locator: "ldjson"
  json_path: "."
  fields:
    id: "@graph.~type:Product.@id.~tail:-"
    title: "@graph.~type:Product.name"
    price: "@graph.~type:Offer.priceSpecification.price"
    currency: "@graph.~type:Offer.priceSpecification.priceCurrency"
    url: "@graph.~type:Offer.url"
    description: "@graph.~type:Product.description"
  attributes:
    area: "@graph.~type:Accommodation.floorSize"
    rooms: "@graph.~type:Accommodation.numberOfBedrooms"
    baths: "@graph.~type:Accommodation.numberOfBathroomsTotal"
    floor: "@graph.~type:Accommodation.floorLevel"
