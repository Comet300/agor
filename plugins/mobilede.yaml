# Mobile.de vendor manifest (cars; RO locale of the German marketplace).
#
# Next.js App Router: listings ship inside RSC flight chunks
# (self.__next_f.push). The `flight:searchResults` locator recovers the
# balanced JSON after "searchResults": — items at .listings. Price is a display
# string ("16.899 EUR" -> parsed 16899) with no machine currency (=EUR literal);
# seller type st is "Dealer" / "Vânzător privat" (normalizer maps both). The
# detail URL is rebuilt from the listing id. Verified live (2026-06).

vendor: MobileDe
domain: mobile.de
categories: [cars]
engine: json-extractor
# Akamai walls a raw undici GET (live 403 from a clean IP — TLS/JA3
# fingerprinting), so this vendor opts into the headless-browser fallback. The
# engine escalates to it ONLY on a recognised hard block, and only when
# ENABLE_BROWSER_FALLBACK is on (optional Playwright deps installed).
# Best-effort: a flagged IP may still be denied.
fetch_strategy: browser
rate_limit_ms: 4000

search_mapping:
  payload_locator: "flight:searchResults"
  json_path_to_items: "listings"
  fields:
    id: "id"
    title: "{shortTitle} {subTitle}"
    price: "p"
    currency: "=EUR"
    url: "https://suchen.mobile.de/fahrzeuge/details.html?id={id}"
    imageUrl: "https://{images[0].uri}"
    isPrivateOwner: "st"
    location: "attr.loc"

# Detail page (calibrated against a live product page 2026-06). The ad ships in
# the RSC flight under "listing": one object holding id + price.grs.{amount,
# currency} + shortTitle/subTitle + contact.type ("Dealer"/private). This is a
# different shape from the search "listings[]" (no flat `p`/`st`), so the anchor
# and field paths differ. The detail URL is rebuilt from the id.
product_mapping:
  payload_locator: "flight:listing"
  json_path: "."
  fields:
    id: "id"
    title: "{shortTitle} {subTitle}"
    price: "price.grs.amount"
    currency: "price.grs.currency"
    url: "https://suchen.mobile.de/fahrzeuge/details.html?id={id}"
    isPrivateOwner: "contact.type"
