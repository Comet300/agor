# Storia Romania vendor manifest (real-estate marketplace).
#
# Storia ships its SERP in __NEXT_DATA__ at props.pageProps.data.searchAds.items
# with a direct `isPrivateOwner` boolean. The only per-item link is a templated
# `[lang]/ad/<slug>`, so the real deep link is built from `slug` via a TEMPLATE
# field: any fields value containing {sub.path} is interpolated by the normalizer.
# The product page exposes the ad at props.pageProps.ad, with the price number at
# target.Price (ad.price itself carries no amount) and an absolute `url`.
#
# Verified against a live SERP + product page (2026-06).

vendor: Storia
domain: storia.ro
engine: json-extractor
rate_limit_ms: 3000

# Search results listing (the SERP grid of property ads).
search_mapping:
  payload_locator: "script#__NEXT_DATA__"
  json_path_to_items: "props.pageProps.data.searchAds.items"
  fields:
    id: "id"
    title: "title"
    price: "totalPrice.value"
    currency: "totalPrice.currency"
    url: "https://www.storia.ro/ro/oferta/{slug}"
    imageUrl: "images[0].medium"
    isPrivateOwner: "isPrivateOwner"
    location: "location.address.city.name"

# Single property detail page.
product_mapping:
  payload_locator: "script#__NEXT_DATA__"
  json_path: "props.pageProps.ad"
  fields:
    id: "id"
    title: "title"
    price: "target.Price"
    currency: "target.Currency"
    url: "url"
    imageUrl: "images[0].thumbnail"
    isPrivateOwner: "advertiserType"
    location: "location.address.city.name"
