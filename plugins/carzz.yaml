# Carzz.ro vendor manifest (cars; server-rendered HTML, dom-selector engine).
#
# Listing cards are WRAPPED by their anchor, so the item-container selector IS
# the anchor (a[href*="-anunt_"]) and url/id read @href on the element itself.
# Prices render as "16.990 eur" (EUR site-wide => =EUR literal); there is no
# seller flag (P2P-leaning => =privat literal). Verified live (2026-06).

vendor: Carzz
domain: carzz.ro
categories: [cars]
engine: dom-selector
rate_limit_ms: 3000

search_mapping:
  payload_locator: ""
  json_path_to_items: 'a[href*="-anunt_"]'
  fields:
    id: "@href"
    title: ".title"
    price: ".price"
    currency: "=EUR"
    url: "@href"
    isPrivateOwner: "=privat"
    location: ".location"

# Detail page (calibrated against a live product page 2026-06). There is no
# ld+json/canonical; the ad's OWN data is microdata-tagged near the title:
# id at #ad_id_show span, its own price at span#price (a bare .price would catch
# the "similar ads" sidebar), and the canonical url in the og:url meta. The root
# selector is `html` so head (the meta) and body (the detail block) are both in
# scope. EUR site-wide (=EUR); no seller flag (=privat).
product_mapping:
  payload_locator: ""
  json_path: "html"
  fields:
    id: "#ad_id_show span"
    title: "h1"
    price: "#price"
    currency: "=EUR"
    url: 'meta[property="og:url"]@content'
    isPrivateOwner: "=privat"
