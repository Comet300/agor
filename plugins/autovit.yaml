# AutoVit Romania vendor manifest (automotive marketplace).
#
# AutoVit embeds its SERP in a GraphQL urql cache: props.pageProps.urqlState is
# keyed by an opaque per-query hash, and each entry's `data` is a STRINGIFIED
# JSON holding advertSearch.edges[].node. The resolver's `*` (try each value)
# and `~json` (parse a string segment) reach it without hardcoding the hash:
#   urqlState.*.data.~json.advertSearch.edges
# Search field paths are therefore relative to each EDGE (node.*). The product
# page exposes the ad directly at props.pageProps.advert (flatter price shape).
# isPrivateOwner reads seller.__typename ("ProfessionalSeller"/"PrivateSeller"),
# mapped to a boolean by the normalizer.
#
# Verified against a live SERP + product page (2026-06).

vendor: AutoVit
domain: autovit.ro
engine: json-extractor
rate_limit_ms: 3000

# Search results listing (the SERP grid of car ads).
search_mapping:
  payload_locator: "script#__NEXT_DATA__"
  json_path_to_items: "props.pageProps.urqlState.*.data.~json.advertSearch.edges"
  fields:
    id: "node.id"
    title: "node.title"
    price: "node.price.amount.value"
    currency: "node.price.amount.currencyCode"
    url: "node.url"
    imageUrl: "node.thumbnail.x1"
    isPrivateOwner: "node.seller.__typename"
    location: "node.location.city.name"
    description: "node.shortDescription"
    postedAt: "node.createdAt"
  # `parameters` is a key/displayValue array (displayValue is the human label;
  # `value` is a slug). ~find selects by key.
  attributes:
    year: "node.parameters.~find:key=year.displayValue"
    km: "node.parameters.~find:key=mileage.displayValue"
    fuel: "node.parameters.~find:key=fuel_type.displayValue"
    power: "node.parameters.~find:key=engine_power.displayValue"
    engine: "node.parameters.~find:key=engine_capacity.displayValue"

# Single advert detail page.
product_mapping:
  payload_locator: "script#__NEXT_DATA__"
  json_path: "props.pageProps.advert"
  fields:
    id: "id"
    title: "title"
    price: "price.value"
    currency: "price.currency"
    url: "url"
    isPrivateOwner: "seller.type"
    location: "seller.location.city.name"
