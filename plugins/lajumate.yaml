# Lajumate.ro vendor manifest (general classifieds).
#
# Classic Next.js: search results live in __NEXT_DATA__ at
# props.pageProps.adsServer. The listing URL is built from slug+id via a
# template field (`/ad/<slug>-<id>` verified live); the image path is relative.
# Sellers carry a phone (user.phone) — powers the Call button. No machine
# company-flag exists, so `!user.is_company` (absent => private) reflects the
# platform's P2P character. Verified against a live SERP (2026-06).

vendor: Lajumate
domain: lajumate.ro
categories: [general]
engine: json-extractor
rate_limit_ms: 3000

search_mapping:
  payload_locator: "script#__NEXT_DATA__"
  json_path_to_items: "props.pageProps.adsServer"
  fields:
    id: "id"
    title: "title"
    price: "price"
    currency: "currency"
    url: "https://lajumate.ro/ad/{slug}-{id}"
    imageUrl: "https://lajumate.ro/{mainImage.path}"
    isPrivateOwner: "!user.is_company"
    location: "city.name"
    phone: "user.phone"

# Detail page (calibrated against a live product page 2026-06): the ad ships in
# __NEXT_DATA__ at props.pageProps.adData with the same field shape as a search
# node, so the search paths apply directly.
product_mapping:
  payload_locator: "script#__NEXT_DATA__"
  json_path: "props.pageProps.adData"
  fields:
    id: "id"
    title: "title"
    price: "price"
    currency: "currency"
    url: "https://lajumate.ro/ad/{slug}-{id}"
    isPrivateOwner: "!user.is_company"
    location: "city.name"
    phone: "user.phone"
