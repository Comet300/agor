# Publi24.ro vendor manifest (general classifieds).
#
# The SERP carries a schema.org ItemList in an application/ld+json block whose
# JSON contains LITERAL control characters inside strings — the engine's
# `ldjson` locator sanitizes and parses it. Item urls are relative (template
# rebuilds them); there is no machine seller flag (P2P-leaning => `!is_business`
# absent => private). `image` is an ImageObject[] (read [0].contentUrl); the
# location lives under the offer's availableAtOrFrom address. Verified against a
# live SERP (2026-06).

vendor: Publi24
domain: publi24.ro
engine: json-extractor
rate_limit_ms: 3000
# SERP pagination is the `pag` query param (?...&pag=2). Verified against a live
# search 2026-06: results span multiple pages, so a watch must walk them to see
# listings beyond page 1 (e.g. a Swace that ranks onto page 2).
pagination:
  param: pag

search_mapping:
  payload_locator: "ldjson"
  json_path_to_items: "itemListElement"
  fields:
    id: "url"
    title: "name"
    description: "description"
    price: "offers.price"
    currency: "offers.priceCurrency"
    url: "https://www.publi24.ro/{url}"
    imageUrl: "image[0].contentUrl"
    isPrivateOwner: "!is_business"
    location: "offers.availableAtOrFrom.address.addressLocality"

# Detail pages embed a single schema.org Product ("." = block root). Calibrated
# against a live product page 2026-06: unlike the SERP (relative urls), the detail
# `url` is ABSOLUTE, so it is used verbatim (templating it would double-prepend
# the host). image is an ImageObject[]; location is under the offer's address.
product_mapping:
  payload_locator: "ldjson"
  json_path: "."
  fields:
    id: "url"
    title: "name"
    description: "description"
    price: "offers.price"
    currency: "offers.priceCurrency"
    url: "url"
    imageUrl: "image[0].contentUrl"
    isPrivateOwner: "!is_business"
    location: "offers.availableAtOrFrom.address.addressLocality"
