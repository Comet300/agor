# Homezz.ro vendor manifest (real estate; server-rendered HTML, dom-selector).
#
# Cards are wrapped by their anchor (…-<id>.html): the container selector is
# the anchor, url/id read @href. Clean semantic classes (.card-box-title/-price/
# -location). Prices like "124,000 €" (=EUR literal); no seller flag (=privat).
# Non-listing .html anchors yield records without title/price and are dropped
# by the normalizer. Verified live (2026-06).

vendor: Homezz
domain: homezz.ro
engine: dom-selector
rate_limit_ms: 3000

search_mapping:
  payload_locator: ""
  json_path_to_items: 'a[href$=".html"]'
  fields:
    id: "@href"
    title: ".card-box-title"
    price: ".card-box-price"
    currency: "=EUR"
    url: "@href"
    imageUrl: "img.single-image@src"
    isPrivateOwner: "=privat"
    location: ".card-box-location"

# Detail page (calibrated against a live product page 2026-06). The ad's OWN
# price is `.main-price` (a bare `.price`/`.card-box-price` catches the "similar
# listings" sidebar); the canonical url is the og:url meta. Root selector is
# `html` so the head meta is in scope. EUR site-wide (=EUR); no seller flag.
product_mapping:
  payload_locator: ""
  json_path: "html"
  fields:
    id: 'meta[property="og:url"]@content'
    title: "h1"
    price: ".main-price"
    currency: "=EUR"
    url: 'meta[property="og:url"]@content'
    isPrivateOwner: "=privat"
