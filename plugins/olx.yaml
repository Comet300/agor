# OLX Romania vendor manifest.
#
# OLX embeds its state in `window.__PRERENDERED_STATE__`, assigned as a
# DOUBLE-ENCODED JSON string (a JS string literal whose contents are escaped
# JSON). The scraping engine's `window.<NAME>` locator decodes that. Verified
# against a live SERP + product page (2026-06): search items live at
# `listing.listing.ads`, the product ad at `ad.ad`.
#
# Field-path convention: a value under `fields` is a dot/bracket path into a
# single item node. A path may be prefixed with "!" to mean the logical NOT of
# the located boolean — e.g. `isPrivateOwner: "!isBusiness"` because OLX flags
# *companies* (isBusiness=true), and a private owner is the negation. The "!" is
# interpreted by the pipeline normalizer. An ad with no price (e.g. a "Schimb"
# exchange listing has `price.regularPrice: null`) is dropped during normalize.

vendor: OLX
domain: olx.ro
engine: json-extractor
rate_limit_ms: 2500

# SERP URL template ({query} = a dash slug) — lets the bot BUILD a search watch
# for OLX, and the pattern EXTRACTS the query back out of an OLX SERP URL. Powers
# cross-platform auto-suggest + "extend search".
search_url_template: "https://www.olx.ro/oferte/q-{query}/"
search_query_pattern: "q-([^/?#]+)"

# Search results listing (the SERP grid of ads).
search_mapping:
  payload_locator: "window.__PRERENDERED_STATE__"
  json_path_to_items: "listing.listing.ads"
  fields:
    id: "id"
    title: "title"
    price: "price.regularPrice.value"
    currency: "price.regularPrice.currencyCode"
    url: "url"
    imageUrl: "photos[0]"
    isPrivateOwner: "!isBusiness"
    location: "location.cityName"
    inStock: "isActive"
    description: "description"
    postedAt: "createdTime"
  # OLX is MULTI-CATEGORY (cars, apartments, phones…) — each listing's `params`
  # carry different specs, so explode WHATEVER the listing has (using OLX's own
  # human labels) rather than a fixed, car-only key list.
  attributes_from:
    path: "params"
    key: "name"
    value: "value"

# Single product / ad detail page.
product_mapping:
  payload_locator: "window.__PRERENDERED_STATE__"
  json_path: "ad.ad"
  fields:
    id: "id"
    title: "title"
    price: "price.regularPrice.value"
    currency: "price.regularPrice.currencyCode"
    url: "url"
    imageUrl: "photos[0]"
    isPrivateOwner: "!isBusiness"
    location: "location.cityName"
    inStock: "isActive"
