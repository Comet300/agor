# Vinted.ro vendor manifest (fashion/second-hand; DataDome-protected).
#
# Next.js App Router: the catalog ships in RSC flight chunks. The
# `flight:items` locator yields candidates for every "items": occurrence; the
# engine picks the first whose .items path resolves (the catalog object
# {"items":[…]}). Price is {amount, currency_code}; the listing URL comes from
# the relative `path`; user.business distinguishes pro sellers. Verified live
# (2026-06). DataDome may challenge sustained polling — watch-health surfaces
# it and PROXY_URLS is the lever.

vendor: Vinted
domain: vinted.ro
engine: json-extractor
rate_limit_ms: 5000

search_mapping:
  payload_locator: "flight:items"
  json_path_to_items: "items"
  fields:
    id: "id"
    title: "title"
    price: "price.amount"
    currency: "price.currency_code"
    url: "https://www.vinted.ro{path}"
    imageUrl: "photo.url"
    isPrivateOwner: "!user.business"

# Detail page (calibrated against a live item page 2026-06). The flight `item`
# node is RSC-referenced (price/seller are lazy refs the extractor can't deref),
# but the page also ships a clean schema.org Product in ld+json — far more
# reliable — so the product surface uses the `ldjson` dialect (search stays
# flight). id is the item slug from the offer url. The ld+json carries no seller
# flag, and an undeclared isPrivateOwner would default to company — so set the
# literal `=true` to honour Vinted's P2P nature (mirrors search's `!user.business`,
# which is true for the individual sellers that make up the catalog).
product_mapping:
  payload_locator: "ldjson"
  json_path: "."
  fields:
    id: "offers.url.~tail:/"
    title: "name"
    price: "offers.price"
    currency: "offers.priceCurrency"
    url: "offers.url"
    imageUrl: "image"
    description: "description"
    isPrivateOwner: "=true"
  # Fashion specs are dedicated ld+json fields (brand/color/category).
  attributes:
    brand: "brand.name"
    color: "color"
    category: "category"
